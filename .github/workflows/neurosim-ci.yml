# AUTH:DEVNEUROSIM:7A3F9E2B | Legacy/.github/workflows/neurosim-ci.yml
# GitHub Actions mirror of Legacy/.gitlab-ci.yml; compliance via scripts/compliance.sh (bash).
# windows-latest: WPF (NeuroSim.UI). Bash is Git for Windows on the runner.

name: NeuroSim CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: neurosim-build
          path: |
            **/bin/Release/**
            **/obj/Release/**
          retention-days: 1

  unit-tests:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: neurosim-build
          path: ${{ github.workspace }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - run: dotnet test NeuroSim.Problems.Tests/NeuroSim.Problems.Tests.csproj -c Release --no-build --verbosity normal

  system-tests:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: neurosim-build
          path: ${{ github.workspace }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - run: dotnet test NeuroSim.SystemTests/NeuroSim.SystemTests.csproj -c Release --no-build --verbosity normal

  compliance:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Compliance (bash)
        shell: bash
        run: bash scripts/compliance.sh
